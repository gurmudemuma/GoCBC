# Ethiopian Coffee Export Consortium Blockchain System (CECBS)
# Complete System Docker Compose Configuration

version: '3.8'

networks:
  cecbs:
    name: cecbs-network
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  fabric_data:

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cecbs-postgres
    environment:
      POSTGRES_DB: cecbs
      POSTGRES_USER: cecbs_user
      POSTGRES_PASSWORD: cecbs_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - cecbs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cecbs_user -d cecbs"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Database (Optional)
  mongodb:
    image: mongo:7
    container_name: cecbs-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
      MONGO_INITDB_DATABASE: cecbs
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - cecbs
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/cecbs --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cecbs-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cecbs
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: cecbs-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cecbs
      DB_USER: cecbs_user
      DB_PASSWORD: cecbs_password
      MONGODB_URI: mongodb://admin:admin_password@mongodb:27017/cecbs?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-cecbs-production-secret-key}
      FABRIC_WALLET_PATH: /app/wallet
      FABRIC_CCP_PATH: /app/fabric/connection-ecta.json
      FABRIC_CHANNEL_NAME: coffeechannel
      FABRIC_CHAINCODE_NAME: coffee
    volumes:
      - ./blockchain/organizations:/app/fabric:ro
      - ./api/wallet:/app/wallet
      - ./api/logs:/app/logs
      - ./api/uploads:/app/uploads
    ports:
      - "3001:3001"
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cecbs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web Application
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: cecbs-ui
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:3001/api/v1
      NEXT_PUBLIC_WS_URL: ws://api:3002
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - cecbs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cecbs-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - ui
    networks:
      - cecbs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: cecbs-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - cecbs
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: cecbs-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3003:3000"
    depends_on:
      - prometheus
    networks:
      - cecbs
    restart: unless-stopped

  # ELK Stack - Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: cecbs-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    volumes:
      - ./elk/elasticsearch/data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - cecbs
    restart: unless-stopped

  # ELK Stack - Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.3
    container_name: cecbs-logstash
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./api/logs:/logs:ro
    ports:
      - "5000:5000"
      - "9600:9600"
    depends_on:
      - elasticsearch
    networks:
      - cecbs
    restart: unless-stopped

  # ELK Stack - Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    container_name: cecbs-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - cecbs
    restart: unless-stopped
