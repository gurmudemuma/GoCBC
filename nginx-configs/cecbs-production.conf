# ============================================================
# CECBS (Coffee Export Consortium Blockchain System)
# Nginx Reverse Proxy Configuration - Production
# ============================================================
# 
# System Architecture:
# - UI (Next.js): Port 3000
# - API (Node.js): Port 3001
# - IPFS Gateway: Port 8080
# - IPFS API: Port 5001
#
# Server IP: 10.3.15.7
# Domain: coffeex.cbe.com.et
# ============================================================

# Upstream definitions
upstream cecbs_ui {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream cecbs_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream ipfs_gateway {
    server 127.0.0.1:8080;
    keepalive 8;
}

upstream ipfs_api {
    server 127.0.0.1:5001;
    keepalive 8;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=20r/m;

# Connection limit (prevent DOS)
limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

# HTTP Server
server {
    listen 80;
    listen [::]:80;
    server_name coffeex.cbe.com.et;

    # Logging
    access_log /var/log/nginx/cecbs-access.log;
    error_log /var/log/nginx/cecbs-error.log warn;

    # Client settings
    client_max_body_size 50M;
    client_body_timeout 120s;
    client_header_timeout 120s;
    
    # Connection limits
    limit_conn addr_limit 10;

    # For Let's Encrypt certificate validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # ==================== API Routes ====================

    # API Health Check (no rate limit, for monitoring)
    location = /api/v1/health {
        access_log off;
        proxy_pass http://cecbs_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Authentication endpoints (strict rate limiting)
    location ~ ^/api/v1/(auth|login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        
        proxy_pass http://cecbs_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Document upload endpoints (moderate rate limiting)
    location ~ ^/api/v1/(documents/upload|exporter/documents) {
        limit_req zone=upload_limit burst=10 nodelay;
        
        proxy_pass http://cecbs_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Extended timeouts for large file uploads
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        
        # Buffering settings for uploads
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # General API routes (standard rate limiting)
    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://cecbs_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        
        # Buffer settings
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # ==================== IPFS Routes ====================

    # IPFS Gateway (public read access)
    location /ipfs/ {
        proxy_pass http://ipfs_gateway/ipfs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Cache IPFS content (immutable)
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Source "IPFS";
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # IPFS WebUI (restricted to internal network)
    location /webui {
        # Restrict access to internal network only
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        proxy_pass http://ipfs_api/webui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # IPFS API (restricted to localhost only - used by API server)
    location /ipfs-api/ {
        # Only allow localhost
        allow 127.0.0.1;
        deny all;
        
        proxy_pass http://ipfs_api/api/v0/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ==================== WebSocket Support ====================

    # WebSocket connections for real-time updates
    location /socket.io/ {
        proxy_pass http://cecbs_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeout settings
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # ==================== Frontend Routes (Next.js) ====================

    # Next.js static files (with caching)
    location /_next/static/ {
        proxy_pass http://cecbs_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Aggressive caching for static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Next.js images
    location /_next/image {
        proxy_pass http://cecbs_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Cache images
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Static assets (images, fonts, etc.)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        proxy_pass http://cecbs_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Cache static assets
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # JavaScript and CSS (no cache for development, add caching in production)
    location ~* \.(js|css|map)$ {
        proxy_pass http://cecbs_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # For production, enable caching:
        # expires 7d;
        # add_header Cache-Control "public, max-age=604800";
        
        # For development, no cache:
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ==================== System Routes ====================

    # System health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Nginx status (restricted to internal network)
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
    }

    # ==================== Security ====================

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ==================== Default Frontend Route ====================

    # All other routes go to Next.js frontend (SPA routing)
    location / {
        proxy_pass http://cecbs_ui;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

