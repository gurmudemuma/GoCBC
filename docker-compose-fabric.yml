      - ./blockchain/organizations/peerOrganizations/ecx.cecbs.et/peers/peer0.ecx.cecbs.et:/etc/hyperledger/fabric
      - ./blockchain/organizations/peerOrganizations/ecx.cecbs.et/users:/etc/hyperledger/fabric/users
      - ./builders:/builders
      - ./config/core.yaml:/etc/hyperledger/fabric/core.yaml
      - peer0.ecx.cecbs.et:/var/hyperledger/production
    ports:
      - 8051:8051
    depends_on:
      - couchdb.ecx
    networks:
      - cecbs

  couchdb.ecx:
    container_name: couchdb.ecx
    image: couchdb:3.3
    environment:
