  # NBE Peer
  peer0.nbe.cecbs.et:
    container_name: peer0.nbe.cecbs.et
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=cecbs-network
      - FABRIC_LOGGING_SPEC=INFO
