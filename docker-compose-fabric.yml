  couchdb.customs:
    container_name: couchdb.customs
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 9984:5984
    networks:
      - cecbs

  # Shipping Peer
  peer0.shipping.cecbs.et:
    container_name: peer0.shipping.cecbs.et
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=cecbs-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.shipping.cecbs.et
      - CORE_PEER_ADDRESS=peer0.shipping.cecbs.et:12051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:12051
      - CORE_PEER_CHAINCODEADDRESS=peer0.shipping.cecbs.et:12052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:12052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.shipping.cecbs.et:12051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.shipping.cecbs.et:12051
      - CORE_PEER_LOCALMSPID=ShippingMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.shipping:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0shipping"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./blockchain/organizations/peerOrganizations/shipping.cecbs.et/peers/peer0.shipping.cecbs.et:/etc/hyperledger/fabric
      - ./blockchain/organizations/peerOrganizations/shipping.cecbs.et/users:/etc/hyperledger/fabric/users
      - ./builders:/builders
      - ./config/core.yaml:/etc/hyperledger/fabric/core.yaml
      - peer0.shipping.cecbs.et:/var/hyperledger/production
    ports:
      - 12051:12051
    depends_on:
      - couchdb.shipping
    networks:
      - cecbs

  couchdb.shipping:
    container_name: couchdb.shipping
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 10984:5984
    networks:
      - cecbs

  # ── Coffee Chaincode (External / Chaincode-as-a-Service) ─────────────────────
  # The chaincode runs as an independent service. All peers connect to it at
  # coffee-chaincode:9999 as defined in chaincodes/coffee/connection.json.
  coffee-chaincode:
    container_name: coffee-chaincode
    build:
      context: ./chaincodes/coffee
      dockerfile: Dockerfile
    image: cecbs/coffee-chaincode:latest
    environment:
      - CHAINCODE_SERVER_ADDRESS=0.0.0.0:9999
      - CORE_CHAINCODE_ID_NAME=coffee_1.28:a94b75399ec6574957be7b04f89264294f1a52e9517a9b0b1ec375595762cd06
      - CORE_CHAINCODE_LOGGING_LEVEL=INFO
    ports:
      - "9999:9999"
    networks:
      - cecbs
    restart: unless-stopped

  # PostgreSQL
  postgres:
    container_name: cecbs-postgres
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=cecbs
      - POSTGRES_PASSWORD=cecbs123
      - POSTGRES_DB=cecbs
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5432:5432
    networks:
      - cecbs

  # Redis
  redis:
    container_name: cecbs-redis
    image: redis:7-alpine
    command: redis-server --requirepass redis123
    volumes:
      - redis-data:/data
    ports:
      - 6379:6379
    networks:
      - cecbs

  # Zookeeper
  zookeeper:
    container_name: cecbs-zookeeper
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - cecbs

  # Kafka
  kafka:
    container_name: cecbs-kafka
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - 9092:9092
    networks:
      - cecbs
