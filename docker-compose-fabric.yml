    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./blockchain/organizations/peerOrganizations/customs.cecbs.et/peers/peer0.customs.cecbs.et:/etc/hyperledger/fabric
      - ./blockchain/organizations/peerOrganizations/customs.cecbs.et/users:/etc/hyperledger/fabric/users
      - ./builders:/builders
      - ./config/core.yaml:/etc/hyperledger/fabric/core.yaml
      - peer0.customs.cecbs.et:/var/hyperledger/production
    ports:
      - 11051:11051
    depends_on:
      - couchdb.customs
    networks:
