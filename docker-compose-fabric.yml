      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.nbe.cecbs.et
      - CORE_PEER_ADDRESS=peer0.nbe.cecbs.et:10051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:10051
      - CORE_PEER_CHAINCODEADDRESS=peer0.nbe.cecbs.et:10052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:10052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.nbe.cecbs.et:10051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.nbe.cecbs.et:10051
      - CORE_PEER_LOCALMSPID=NBEMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.nbe:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0nbe"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./blockchain/organizations/peerOrganizations/nbe.cecbs.et/peers/peer0.nbe.cecbs.et:/etc/hyperledger/fabric
      - ./blockchain/organizations/peerOrganizations/nbe.cecbs.et/users:/etc/hyperledger/fabric/users
      - ./builders:/builders
      - ./config/core.yaml:/etc/hyperledger/fabric/core.yaml
      - peer0.nbe.cecbs.et:/var/hyperledger/production
    ports:
      - 10051:10051
    depends_on:
      - couchdb.nbe
    networks:
      - cecbs

  couchdb.nbe:
    container_name: couchdb.nbe
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 8984:5984
    networks:
      - cecbs

  peer0.customs.cecbs.et:
    container_name: peer0.customs.cecbs.et
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=cecbs-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.customs.cecbs.et
      - CORE_PEER_ADDRESS=peer0.customs.cecbs.et:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.customs.cecbs.et:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.customs.cecbs.et:11051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.customs.cecbs.et:11051
      - CORE_PEER_LOCALMSPID=CustomsMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.customs:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0customs"}
