      - CORE_PEER_CHAINCODEADDRESS=peer0.ecx.cecbs.et:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.ecx.cecbs.et:8051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.ecx.cecbs.et:8051
      - CORE_PEER_LOCALMSPID=ECXMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.ecx:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0ecx"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    working_dir: /root
    command: peer node start
