      - CORE_PEER_ADDRESS=peer0.banks.cecbs.et:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.banks.cecbs.et:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
